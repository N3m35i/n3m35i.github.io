<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Balilla Stats</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --surface3: #282828;
  --border: #2a2a2a;
  --text: #f0ede8;
  --muted: #666;
  --accent: #e8ff47;
  --accent-dim: #b8cc30;
  --red: #ff4e4e;
  --blue: #4e9fff;
  --green: #47ff8a;
  --orange: #ff8c47;
  --font-head: 'Barlow Condensed', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --r: 10px;
  --r-sm: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-mono); overflow: hidden; }
body { display: flex; flex-direction: column; }

/* NAV */
#nav {
  display: flex; gap: 0; background: var(--surface);
  border-top: 1px solid var(--border); order: 2;
  flex-shrink: 0;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 4px 12px; gap: 4px; background: none; border: none; color: var(--muted);
  font-family: var(--font-mono); font-size: 9px; letter-spacing: .04em; cursor: pointer;
  transition: color .2s; text-transform: uppercase;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 20px; height: 20px; }

/* PAGES */
#app { flex: 1; overflow: hidden; order: 1; position: relative; }
.page { position: absolute; inset: 0; overflow-y: auto; padding: 16px 16px 24px; display: none; flex-direction: column; gap: 16px; }
.page.active { display: flex; }

/* TYPOGRAPHY */
h1 { font-family: var(--font-head); font-size: 48px; font-weight: 800; letter-spacing: .02em; text-transform: uppercase; line-height: 1; }
h2 { font-family: var(--font-head); font-size: 34px; font-weight: 700; letter-spacing: .02em; text-transform: uppercase; line-height: 1; }
h3 { font-family: var(--font-head); font-size: 24px; font-weight: 600; letter-spacing: .02em; text-transform: uppercase; line-height: 1; }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; }
.card-sm { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 12px; }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 20px; border-radius: var(--r-sm); border: none; cursor: pointer;
  font-family: var(--font-mono); font-size: 13px; font-weight: 500; transition: all .15s;
}
.btn-primary { background: var(--accent); color: #0a0a0a; }
.btn-primary:hover { background: var(--accent-dim); }
.btn-secondary { background: var(--surface3); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--muted); }
.btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red)30; }
.btn-sm { padding: 7px 14px; font-size: 11px; }
.btn-full { width: 100%; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* INPUTS */
input, select {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm);
  color: var(--text); font-family: var(--font-mono); font-size: 14px; padding: 10px 12px;
  width: 100%; outline: none; transition: border-color .2s; -webkit-appearance: none;
}
input:focus, select:focus { border-color: var(--accent)80; }
select option { background: var(--surface2); }

/* PILL */
.pill {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 500;
  letter-spacing: .05em; text-transform: uppercase;
}
.pill-accent { background: var(--accent)22; color: var(--accent); border: 1px solid var(--accent)40; }
.pill-red { background: var(--red)22; color: var(--red); border: 1px solid var(--red)40; }
.pill-blue { background: var(--blue)22; color: var(--blue); border: 1px solid var(--blue)40; }
.pill-green { background: var(--green)22; color: var(--green); border: 1px solid var(--green)40; }
.pill-muted { background: var(--surface3); color: var(--muted); border: 1px solid var(--border); }

/* RANK BADGE */
.rank { font-family: var(--font-head); font-size: 36px; font-weight: 800; min-width: 36px; letter-spacing: .02em; line-height: 1; }
.rank-1 { color: var(--accent); }
.rank-2 { color: #c0c0c0; }
.rank-3 { color: #cd7f32; }

/* AVATAR */
.avatar {
  width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head); font-weight: 800; font-size: 14px; flex-shrink: 0;
}

/* SCORE INPUT */
.score-box {
  display: flex; align-items: center; gap: 12px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px;
}
.score-num {
  font-family: var(--font-head); font-size: 56px; font-weight: 800;
  min-width: 52px; text-align: center; line-height: 1;
}
.score-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--surface3); color: var(--text); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0;
}
.score-btn:hover { border-color: var(--accent); color: var(--accent); }

/* PLAYER TOGGLE */
.player-toggle {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm);
  cursor: pointer; transition: all .15s;
}
.player-toggle.selected { border-color: var(--accent)60; background: var(--accent)0a; }
.toggle-check { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.player-toggle.selected .toggle-check { background: var(--accent); border-color: var(--accent); }

/* MATCH CARD */
.match-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden;
}
.match-header { padding: 10px 14px; background: var(--surface2); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.match-body { padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
.team-col { flex: 1; }
.team-score { font-family: var(--font-head); font-size: 42px; font-weight: 800; line-height: 1; }
.team-score.winner { color: var(--accent); }
.vs { font-size: 11px; color: var(--muted); padding: 0 4px; }
.team-names { font-size: 11px; color: var(--muted); line-height: 1.6; }

/* SKILL BAR */
.skill-bar-wrap { display: flex; align-items: center; gap: 8px; }
.skill-bar-bg { flex: 1; height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.skill-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width .5s; }

/* ROLE TAG */
.role-tag { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; padding: 2px 6px; border-radius: 3px; }
.role-p { background: var(--blue)20; color: var(--blue); }
.role-a { background: var(--orange)20; color: var(--orange); }

/* SESSION STATUS */
.session-progress { display: flex; gap: 4px; }
.sp-dot { flex: 1; height: 4px; border-radius: 2px; background: var(--surface3); }
.sp-dot.done { background: var(--accent); }
.sp-dot.current { background: var(--accent)60; }

/* TOAST */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface3); border: 1px solid var(--border); border-radius: var(--r-sm);
  padding: 10px 18px; font-size: 12px; opacity: 0; transition: all .3s; pointer-events: none;
  white-space: nowrap; z-index: 999;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* MODAL */
#modal-overlay {
  position: fixed; inset: 0; background: #00000090; z-index: 100;
  display: none; align-items: flex-end; justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r) var(--r) 0 0;
  width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto;
  padding: 20px 20px 36px;
}

/* DIVIDER */
.divider { height: 1px; background: var(--border); margin: 4px 0; }

/* STAT GRID */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-cell { background: var(--surface2); border-radius: var(--r-sm); padding: 12px; }
.stat-cell .val { font-family: var(--font-head); font-size: 24px; font-weight: 800; }
.stat-cell .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-top: 2px; }

/* HEAD BAR */
.head-bar { display: flex; align-items: center; justify-content: space-between; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

/* ANIM */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.page.active > * { animation: fadeIn .25s ease both; }
.page.active > *:nth-child(2) { animation-delay: .04s; }
.page.active > *:nth-child(3) { animation-delay: .08s; }
.page.active > *:nth-child(4) { animation-delay: .12s; }
.page.active > *:nth-child(5) { animation-delay: .16s; }

/* EMPTY STATE */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }

/* SECTION LABEL */
.section-label { display: flex; align-items: center; gap: 8px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
</style>
</head>
<body>

<div id="app">

  <!-- PAGE: CLASSIFICA -->
  <div class="page active" id="page-rank">
    <div class="head-bar">
      <h1>Classifica</h1>
      <span class="label" id="rank-updated"></span>
    </div>
    <div id="rank-list"></div>
    <div class="card" style="background: var(--surface2);">
      <div class="label" style="margin-bottom: 8px;">Come funziona lo skill score</div>
      <div style="font-size: 11px; color: var(--muted); line-height: 1.7;">
        Rating ELO adattato: ogni vittoria/sconfitta aggiorna il punteggio in base alla forza degli avversari.
        Portieri e attaccanti hanno pesi diversi. Il divario di gol amplifica o riduce il delta.
      </div>
    </div>
  </div>

  <!-- PAGE: SESSIONE -->
  <div class="page" id="page-session">
    <div id="session-setup" style="display:flex;flex-direction:column;gap:16px;"></div>
    <div id="session-active" style="display:none;flex-direction:column;gap:16px;"></div>
  </div>

  <!-- PAGE: STORICO -->
  <div class="page" id="page-history">
    <div class="head-bar">
      <h1>Storico</h1>
      <span class="label" id="history-count"></span>
    </div>
    <div id="history-list"></div>
  </div>

  <!-- PAGE: GIOCATORI -->
  <div class="page" id="page-players">
    <div class="head-bar">
      <h1>Giocatori</h1>
      <button class="btn btn-secondary btn-sm" onclick="showAddPlayer()">+ aggiungi</button>
    </div>
    <div id="players-list"></div>
  </div>

</div>

<nav id="nav">
  <button class="nav-btn active" onclick="showPage('rank')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    classifica
  </button>
  <button class="nav-btn" onclick="showPage('session')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
    sessione
  </button>
  <button class="nav-btn" onclick="showPage('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    storico
  </button>
  <button class="nav-btn" onclick="showPage('players')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
    giocatori
  </button>
</nav>

<div id="toast"></div>

<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal-box"></div>
</div>

<script>
// ===================== DATA =====================
const PLAYERS_DEFAULT = [
  { id: 'ale', name: 'Alessandro', color: '#e8ff47' },
  { id: 'mar', name: 'Marco',      color: '#4e9fff' },
  { id: 'giu', name: 'Giulio',     color: '#ff4e4e' },
  { id: 'rob', name: 'Roberto',    color: '#ff8c47' },
  { id: 'luc', name: 'Luca',       color: '#47ff8a' },
];
const K = 32;
const INIT_RATING = 1500;

function load(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } }
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

let players = load('bs_players', PLAYERS_DEFAULT.map(p => ({ ...p, rating: INIT_RATING, ratingP: INIT_RATING, ratingA: INIT_RATING })));
let matches = load('bs_matches', []);
let session = load('bs_session', null);

function saveAll() { save('bs_players', players); save('bs_matches', matches); save('bs_session', session); }

function getPlayer(id) { return players.find(p => p.id === id); }

// ===================== ELO =====================
function expectedScore(rA, rB) { return 1 / (1 + Math.pow(10, (rB - rA) / 400)); }

function updateRatings(match) {
  // match: { team1: [{id, role}], team2: [{id, role}], score1, score2 }
  const avg = arr => arr.reduce((s, p) => s + getRoleRating(p.id, p.role), 0) / arr.length;
  const r1 = avg(match.team1);
  const r2 = avg(match.team2);
  const e1 = expectedScore(r1, r2);
  const e2 = 1 - e1;
  const total = match.score1 + match.score2 || 1;
  const margin = Math.abs(match.score1 - match.score2) / total;
  const kAdj = K * (1 + margin * 0.5);

  const s1 = match.score1 > match.score2 ? 1 : match.score1 === match.score2 ? 0.5 : 0;
  const s2 = 1 - s1;

  match.team1.forEach(p => {
    const delta = Math.round(kAdj * (s1 - e1));
    applyDelta(p.id, p.role, delta);
  });
  match.team2.forEach(p => {
    const delta = Math.round(kAdj * (s2 - e2));
    applyDelta(p.id, p.role, delta);
  });
}

function getRoleRating(id, role) {
  const p = getPlayer(id);
  return role === 'P' ? p.ratingP : p.ratingA;
}

function applyDelta(id, role, delta) {
  const p = getPlayer(id);
  if (role === 'P') { p.ratingP = Math.max(800, p.ratingP + delta); }
  else { p.ratingA = Math.max(800, p.ratingA + delta); }
  p.rating = Math.round((p.ratingP + p.ratingA) / 2);
}

function recalcAllRatings() {
  players.forEach(p => { p.rating = INIT_RATING; p.ratingP = INIT_RATING; p.ratingA = INIT_RATING; });
  matches.forEach(m => updateRatings(m));
}

// ===================== TEAM GENERATOR =====================
function generateTeams(presentIds, goalTarget) {
  // 5 players, 4 play at a time, 1 rests — rotate rest
  if (presentIds.length < 4) return null;
  const perms = [];
  for (let i = 0; i < presentIds.length; i++) {
    const resting = presentIds[i];
    const playing = presentIds.filter((_, j) => j !== i);
    const combos = getCombinations(playing, 2);
    combos.forEach(t1 => {
      const t2 = playing.filter(id => !t1.includes(id));
      const roleAssignments = [
        [{ id: t1[0], role: 'P' }, { id: t1[1], role: 'A' }, { id: t2[0], role: 'P' }, { id: t2[1], role: 'A' }],
        [{ id: t1[0], role: 'A' }, { id: t1[1], role: 'P' }, { id: t2[0], role: 'P' }, { id: t2[1], role: 'A' }],
        [{ id: t1[0], role: 'P' }, { id: t1[1], role: 'A' }, { id: t2[0], role: 'A' }, { id: t2[1], role: 'P' }],
        [{ id: t1[0], role: 'A' }, { id: t1[1], role: 'P' }, { id: t2[0], role: 'A' }, { id: t2[1], role: 'P' }],
      ];
      roleAssignments.forEach(ra => {
        const team1 = [ra[0], ra[1]];
        const team2 = [ra[2], ra[3]];
        const r1 = team1.reduce((s, p) => s + getRoleRating(p.id, p.role), 0) / 2;
        const r2 = team2.reduce((s, p) => s + getRoleRating(p.id, p.role), 0) / 2;
        perms.push({ team1, team2, resting, diff: Math.abs(r1 - r2) });
      });
    });
  }
  perms.sort((a, b) => a.diff - b.diff);
  return perms[0] || null;
}

function generateSession(presentIds, numMatches, goalTarget) {
  const matchList = [];
  const restCount = {};
  presentIds.forEach(id => restCount[id] = 0);

  for (let i = 0; i < numMatches; i++) {
    const sorted = [...presentIds].sort((a, b) => (restCount[a] || 0) - (restCount[b] || 0));
    const gen = generateTeams(sorted, goalTarget);
    if (!gen) break;
    matchList.push({ team1: gen.team1, team2: gen.team2, resting: gen.resting, score1: null, score2: null, done: false });
    restCount[gen.resting] = (restCount[gen.resting] || 0) + 1;
  }
  return matchList;
}

function getCombinations(arr, k) {
  if (k === 0) return [[]];
  if (arr.length < k) return [];
  const [first, ...rest] = arr;
  return [
    ...getCombinations(rest, k - 1).map(c => [first, ...c]),
    ...getCombinations(rest, k)
  ];
}

// ===================== UI UTILS =====================
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn')[['rank','session','history','players'].indexOf(name)].classList.add('active');
  if (name === 'rank') renderRank();
  if (name === 'session') renderSession();
  if (name === 'history') renderHistory();
  if (name === 'players') renderPlayers();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function openModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}
window.closeModalForce = function() { document.getElementById('modal-overlay').classList.remove('open'); };

function initials(name) { return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2); }

function avatar(p, size = 36) {
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${p.color}20;color:${p.color};font-size:${Math.round(size * .38)}px;">${initials(p.name)}</div>`;
}

function stars(rating) {
  const max = 2000, min = 1200;
  const s = Math.round(((rating - min) / (max - min)) * 5);
  const clamped = Math.max(0, Math.min(5, s));
  return '★'.repeat(clamped) + '☆'.repeat(5 - clamped);
}

function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('it-IT', { day: '2-digit', month: 'short', year: 'numeric' });
}

// ===================== RENDER: RANK =====================
function renderRank() {
  const sorted = [...players].sort((a, b) => b.rating - a.rating);
  const maxR = sorted[0]?.rating || INIT_RATING;
  const minR = sorted[sorted.length - 1]?.rating || INIT_RATING;

  const totalMatches = matches.length;
  document.getElementById('rank-updated').textContent = totalMatches + ' partite';

  let html = '';
  sorted.forEach((p, i) => {
    const rank = i + 1;
    const playerMatches = matches.filter(m => [...m.team1, ...m.team2].some(x => x.id === p.id));
    const wins = playerMatches.filter(m => {
      const inT1 = m.team1.some(x => x.id === p.id);
      return inT1 ? m.score1 > m.score2 : m.score2 > m.score1;
    }).length;
    const winPct = playerMatches.length ? Math.round(wins / playerMatches.length * 100) : 0;
    const barW = maxR > minR ? Math.round(((p.rating - minR) / (maxR - minR)) * 60 + 40) : 80;
    const rankClass = rank <= 3 ? `rank-${rank}` : '';

    html += `
    <div class="card" style="margin-bottom:8px;cursor:pointer;" onclick="showPlayerDetail('${p.id}')">
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="rank ${rankClass}">${rank}</span>
        ${avatar(p, 40)}
        <div style="flex:1;">
          <div style="font-family:var(--font-head);font-weight:700;font-size:15px;">${p.name}</div>
          <div style="font-size:11px;color:${p.color};margin-top:1px;">${stars(p.rating)}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:var(--font-head);font-size:20px;font-weight:800;">${p.rating}</div>
          <div style="font-size:10px;color:var(--muted);">${winPct}% win · ${playerMatches.length}G</div>
        </div>
      </div>
      <div class="skill-bar-wrap" style="margin-top:10px;">
        <div class="skill-bar-bg">
          <div class="skill-bar-fill" style="width:${barW}%;background:${p.color};"></div>
        </div>
      </div>
    </div>`;
  });

  document.getElementById('rank-list').innerHTML = html || '<div class="empty"><div class="empty-icon">📊</div>Nessuna partita ancora</div>';
}

// ===================== RENDER: PLAYER DETAIL =====================
window.showPlayerDetail = function(id) {
  const p = getPlayer(id);
  const playerMatches = matches.filter(m => [...m.team1, ...m.team2].some(x => x.id === id));
  const wins = playerMatches.filter(m => {
    const inT1 = m.team1.some(x => x.id === id);
    return inT1 ? m.score1 > m.score2 : m.score2 > m.score1;
  }).length;
  const losses = playerMatches.filter(m => {
    const inT1 = m.team1.some(x => x.id === id);
    return inT1 ? m.score1 < m.score2 : m.score2 < m.score1;
  }).length;
  const winPct = playerMatches.length ? Math.round(wins / playerMatches.length * 100) : 0;
  const asP = playerMatches.filter(m => [...m.team1, ...m.team2].find(x => x.id === id)?.role === 'P').length;
  const asA = playerMatches.length - asP;

  openModal(`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
      ${avatar(p, 52)}
      <div>
        <h2 style="font-family:var(--font-head);">${p.name}</h2>

      <div class="stat-cell"><div class="val">${playerMatches.length}</div><div class="lbl">partite</div></div>
      <div class="stat-cell"><div class="val" style="color:var(--accent);">${winPct}%</div><div class="lbl">win rate</div></div>
      <div class="stat-cell"><div class="val" style="color:var(--green);">${wins}</div><div class="lbl">vittorie</div></div>
      <div class="stat-cell"><div class="val" style="color:var(--red);">${losses}</div><div class="lbl">sconfitte</div></div>
    </div>
    <div style="margin-bottom:16px;">
      <div class="label" style="margin-bottom:8px;">rating per ruolo</div>
      <div style="display:flex;gap:10px;">
        <div class="card-sm" style="flex:1;text-align:center;">
          <div style="font-size:10px;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;">portiere</div>
          <div style="font-family:var(--font-head);font-size:22px;font-weight:800;margin-top:4px;">${p.ratingP}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;">${asP} partite</div>
        </div>
        <div class="card-sm" style="flex:1;text-align:center;">
          <div style="font-size:10px;color:var(--orange);text-transform:uppercase;letter-spacing:.08em;">attaccante</div>
          <div style="font-family:var(--font-head);font-size:22px;font-weight:800;margin-top:4px;">${p.ratingA}</div>

    <button class="btn btn-secondary btn-full" onclick="closeModalForce()">chiudi</button>

};

// ===================== RENDER: SESSION =====================
function renderSession() {
  if (session && session.matches && !session.done) {
    renderActiveSession();
  } else {
    renderSessionSetup();
  }
}

function renderSessionSetup() {

  const el = document.getElementById('session-setup');

let _selectedPlayers = new Set(players.map(p => p.id));
let _numMatches = 6;
let _goalTarget = 10;

window.togglePlayer = function(id) {
  if (_selectedPlayers.has(id)) {
    if (_selectedPlayers.size <= 4) { toast('minimo 4 giocatori'); return; }
    _selectedPlayers.delete(id);
    document.getElementById('toggle-' + id).classList.remove('selected');
  } else {
    _selectedPlayers.add(id);
    document.getElementById('toggle-' + id).classList.add('selected');
  }
};

window.setNumMatches = function(n) {
  _numMatches = n;
  document.querySelectorAll('[id^="nm-"]').forEach(b => { if (b.tagName === 'BUTTON') { b.classList.remove('btn-primary'); b.classList.add('btn-secondary'); } });
  const el = document.getElementById('nm-' + n);
  if (el) { el.classList.remove('btn-secondary'); el.classList.add('btn-primary'); }
  const custom = document.getElementById('nm-custom');
  if (custom) custom.value = '';
};

window.setNumMatchesCustom = function(val) {
  const n = parseInt(val);
  if (!n || n < 1) return;
  _numMatches = n;
  document.querySelectorAll('[id^="nm-"]').forEach(b => { if (b.tagName === 'BUTTON') { b.classList.remove('btn-primary'); b.classList.add('btn-secondary'); } });
};

window.setGoalTarget = function(n) {
  _goalTarget = n;
  document.querySelectorAll('[id^="gm-"]').forEach(b => b.classList.remove('btn-primary'));
  document.querySelectorAll('[id^="gm-"]').forEach(b => b.classList.add('btn-secondary'));
  const el = document.getElementById('gm-' + n);
  if (el) { el.classList.remove('btn-secondary'); el.classList.add('btn-primary'); }
};

window.startSession = function() {
  const presentIds = [..._selectedPlayers];
  if (presentIds.length < 4) { toast('servono almeno 4 giocatori'); return; }
  const matchList = generateSession(presentIds, _numMatches, _goalTarget);
  session = { presentIds, numMatches: _numMatches, goalTarget: _goalTarget, matches: matchList, current: 0, done: false, ts: Date.now() };
  saveAll();
  renderActiveSession();
};

function renderActiveSession() {
  document.getElementById('session-setup').style.display = 'none';
  const el = document.getElementById('session-active');
  el.style.display = 'flex';

  if (!session || !session.matches) { renderSessionSetup(); return; }

  const total = session.matches.length;
  const done = session.matches.filter(m => m.done).length;
  const current = session.current;
  const match = session.matches[current];

  const progressDots = session.matches.map((m, i) => {
    let cls = m.done ? 'done' : i === current ? 'current' : '';
    return `<div class="sp-dot ${cls}"></div>`;
  }).join('');

  let html = `
    <div class="head-bar">
      <h1>Sessione</h1>
      <button class="btn btn-secondary btn-sm" onclick="confirmEndSession()">fine</button>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <span class="label">avanzamento</span>
        <span style="font-size:11px;color:var(--muted);">${done}/${total} partite</span>
      </div>
      <div class="session-progress">${progressDots}</div>
    </div>
  `;

  if (match && !match.done) {
    const t1 = match.team1.map(p => ({ ...getPlayer(p.id), role: p.role }));
    const t2 = match.team2.map(p => ({ ...getPlayer(p.id), role: p.role }));
    const resting = match.resting ? getPlayer(match.resting) : null;

    html += `
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <h2>Partita ${current + 1}</h2>
        <button class="btn btn-secondary btn-sm" onclick="editMatch(${current})">modifica</button>
      </div>

      <div style="display:flex;gap:10px;margin-bottom:14px;">
        <div class="card-sm" style="flex:1;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
            <div style="width:8px;height:8px;border-radius:50%;background:var(--red);"></div>
            <span class="label">squadra rossa</span>
          </div>
          ${t1.map(p => `
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
              ${avatar(p, 28)}
              <span style="font-size:13px;">${p.name}</span>
              <span class="role-tag ${p.role === 'P' ? 'role-p' : 'role-a'}" style="margin-left:auto;">${p.role === 'P' ? 'POR' : 'ATT'}</span>
            </div>
          `).join('')}
        </div>
        <div class="card-sm" style="flex:1;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
            <div style="width:8px;height:8px;border-radius:50%;background:var(--blue);"></div>
            <span class="label">squadra blu</span>
          </div>
          ${t2.map(p => `
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
              ${avatar(p, 28)}
              <span style="font-size:13px;">${p.name}</span>
              <span class="role-tag ${p.role === 'P' ? 'role-p' : 'role-a'}" style="margin-left:auto;">${p.role === 'P' ? 'POR' : 'ATT'}</span>
            </div>
          `).join('')}
        </div>
      </div>

      ${resting ? `<div style="font-size:11px;color:var(--muted);margin-bottom:14px;">riposa: <span style="color:${resting.color}">${resting.name}</span></div>` : ''}

      <div class="label" style="margin-bottom:8px;">risultato (primo a ${session.goalTarget})</div>
      <div class="score-box" style="margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--red);"></div>
          <button class="score-btn" onclick="changeScore(0,-1)">−</button>
          <div class="score-num" id="s1" style="color:var(--red);">0</div>
          <button class="score-btn" onclick="changeScore(0,1)">+</button>
        </div>
        <span class="vs" style="flex:1;text-align:center;">vs</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="score-btn" onclick="changeScore(1,-1)">−</button>
          <div class="score-num" id="s2" style="color:var(--blue);">0</div>
          <button class="score-btn" onclick="changeScore(1,1)">+</button>
          <div style="width:8px;height:8px;border-radius:50%;background:var(--blue);"></div>
        </div>
      </div>

      <button class="btn btn-primary btn-full" onclick="submitResult()" style="font-size:15px;padding:16px;">
        conferma risultato →
      </button>
    </div>
    `;
  } else if (session.done || done === total) {
    html += `
    <div class="card" style="text-align:center;padding:32px 20px;">
      <div style="font-size:48px;margin-bottom:12px;">🏆</div>
      <h2 style="margin-bottom:8px;">Sessione completata!</h2>
      <div style="color:var(--muted);font-size:13px;margin-bottom:20px;">${total} partite giocate</div>
      <button class="btn btn-primary btn-full" onclick="endSession()">nuova sessione</button>
    </div>
    `;
  }

  // Prossime partite
  if (!session.done && done < total) {
    const upcoming = session.matches.slice(current + 1, current + 4).filter(m => !m.done);
    if (upcoming.length > 0) {
      html += `<div class="label" style="margin-top:4px;">prossime partite</div>`;
      upcoming.forEach((m, i) => {
        const n = current + i + 2;
        const t1names = m.team1.map(x => getPlayer(x.id)?.name.split(' ')[0]).join(' + ');
        const t2names = m.team2.map(x => getPlayer(x.id)?.name.split(' ')[0]).join(' + ');
        html += `
          <div class="card-sm" style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:11px;color:var(--muted);">#${n}</span>
            <span style="font-size:12px;flex:1;">${t1names}</span>
            <span style="font-size:11px;color:var(--muted);">vs</span>
            <span style="font-size:12px;flex:1;text-align:right;">${t2names}</span>
          </div>`;
      });
    }
  }

  el.innerHTML = html;
  _scores = [0, 0];
}

let _scores = [0, 0];

window.changeScore = function(team, delta) {
  _scores[team] = Math.max(0, _scores[team] + delta);
  document.getElementById('s1').textContent = _scores[0];
  document.getElementById('s2').textContent = _scores[1];
};

window.submitResult = function() {
  const match = session.matches[session.current];
  if (_scores[0] === 0 && _scores[1] === 0) { toast('inserisci il risultato'); return; }
  match.score1 = _scores[0];
  match.score2 = _scores[1];
  match.done = true;
  match.ts = Date.now();

  // Salva partita globale
  matches.push({ ...match });
  updateRatings(match);

  // Avanza
  session.current++;
  if (session.current >= session.matches.length) session.done = true;
  saveAll();
  toast('risultato salvato!');
  _scores = [0, 0];
  renderActiveSession();
};

window.confirmEndSession = function() {
  openModal(`
    <h2 style="margin-bottom:12px;">Termina sessione?</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:20px;">Le partite giocate finora verranno comunque salvate.</p>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-danger" style="flex:1;" onclick="endSession()">termina</button>
      <button class="btn btn-secondary" style="flex:1;" onclick="closeModalForce()">annulla</button>
    </div>
  `);
};

window.endSession = function() {
  session = null;
  saveAll();
  closeModalForce();
  _selectedPlayers = new Set(players.map(p => p.id));
  renderSessionSetup();
};

window.editMatch = function(idx) {
  const match = session.matches[idx];
  const allIds = [...session.presentIds];

  const buildTeamEditor = (teamKey, label, color) => {
    const team = match[teamKey];
    return `
      <div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--${color});"></div>
          <span class="label">${label}</span>
        </div>
        ${team.map((p, i) => `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <select id="edit-${teamKey}-${i}-id" onchange="updateEditRoles()" style="flex:1;">
              ${allIds.map(id => `<option value="${id}" ${id === p.id ? 'selected' : ''}>${getPlayer(id).name}</option>`).join('')}
            </select>
            <select id="edit-${teamKey}-${i}-role" style="width:70px;">
              <option value="P" ${p.role === 'P' ? 'selected' : ''}>POR</option>
              <option value="A" ${p.role === 'A' ? 'selected' : ''}>ATT</option>
            </select>
          </div>
        `).join('')}
      </div>
    `;
  };

  openModal(`
    <h2 style="margin-bottom:16px;">Modifica partita ${idx + 1}</h2>
    ${buildTeamEditor('team1', 'squadra rossa', 'red')}
    <div class="divider" style="margin:12px 0;"></div>
    ${buildTeamEditor('team2', 'squadra blu', 'blue')}
    <div style="margin-top:12px;">
      <div class="label" style="margin-bottom:8px;">chi riposa</div>
      <select id="edit-resting" style="width:100%;">
        <option value="">nessuno</option>
        ${allIds.map(id => `<option value="${id}" ${match.resting === id ? 'selected' : ''}>${getPlayer(id).name}</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn btn-primary" style="flex:1;" onclick="saveEditMatch(${idx})">salva</button>
      <button class="btn btn-secondary" style="flex:1;" onclick="closeModalForce()">annulla</button>
    </div>
  `);
};

window.saveEditMatch = function(idx) {
  const match = session.matches[idx];
  const get = id => document.getElementById(id)?.value;
  match.team1 = [
    { id: get('edit-team1-0-id'), role: get('edit-team1-0-role') },
    { id: get('edit-team1-1-id'), role: get('edit-team1-1-role') },
  ];
  match.team2 = [
    { id: get('edit-team2-0-id'), role: get('edit-team2-0-role') },
    { id: get('edit-team2-1-id'), role: get('edit-team2-1-role') },
  ];
  match.resting = get('edit-resting') || null;
  saveAll();
  closeModalForce();
  renderActiveSession();
  toast('formazione aggiornata');
};

// ===================== RENDER: HISTORY =====================
function renderHistory() {
  const el = document.getElementById('history-list');
  document.getElementById('history-count').textContent = matches.length + ' partite';

  if (matches.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>Nessuna partita ancora</div>';
    return;
  }

  const reversed = [...matches].reverse();
  let html = '';
  reversed.forEach((m, i) => {
    const t1 = m.team1.map(p => ({ ...getPlayer(p.id), role: p.role }));
    const t2 = m.team2.map(p => ({ ...getPlayer(p.id), role: p.role }));
    const w1 = m.score1 > m.score2;
    const w2 = m.score2 > m.score1;

    html += `
    <div class="match-card" style="margin-bottom:8px;">
      <div class="match-header">
        <span class="label">${formatDate(m.ts || Date.now())}</span>
        <span style="font-size:10px;color:var(--muted);">gol</span>
      </div>
      <div class="match-body">
        <div class="team-col">
          <div style="display:flex;align-items:center;gap:4px;margin-bottom:2px;">
            <div style="width:6px;height:6px;border-radius:50%;background:var(--red);"></div>
            <span style="font-size:10px;color:var(--muted);">rossa</span>
          </div>
          <div class="team-names">
            ${t1.map(p => `${p.name} <span class="role-tag ${p.role === 'P' ? 'role-p' : 'role-a'}">${p.role}</span>`).join('<br>')}
          </div>
        </div>
        <div style="text-align:center;min-width:80px;">
          <span class="team-score ${w1 ? 'winner' : ''}">${m.score1}</span>
          <span class="vs">—</span>
          <span class="team-score ${w2 ? 'winner' : ''}">${m.score2}</span>
        </div>
        <div class="team-col" style="text-align:right;">
          <div style="display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-bottom:2px;">
            <span style="font-size:10px;color:var(--muted);">blu</span>
            <div style="width:6px;height:6px;border-radius:50%;background:var(--blue);"></div>
          </div>
          <div class="team-names">
            ${t2.map(p => `${p.name} <span class="role-tag ${p.role === 'P' ? 'role-p' : 'role-a'}">${p.role}</span>`).join('<br>')}
          </div>
        </div>
      </div>
    </div>`;
  });

  el.innerHTML = html;
}

window.addPlayer = function() {
  const nameEl = document.getElementById('new-player-name');
  const name = nameEl?.value?.trim();
  if (!name) { toast('inserisci un nome'); return; }
  if (players.find(p => p.name.toLowerCase() === name.toLowerCase())) { toast('nome già esistente'); return; }
  const id = 'p' + Date.now();
  players.push({ id, name, color: _newPlayerColor, rating: INIT_RATING, ratingP: INIT_RATING, ratingA: INIT_RATING });
  _selectedPlayers.add(id);
  saveAll();
  closeModalForce();
  renderPlayers();
  toast(name + ' aggiunto!');
};

window.showRemovePlayer = function(id) {
  const p = getPlayer(id);
  const pMatches = matches.filter(m => [...m.team1, ...m.team2].some(x => x.id === id)).length;
  openModal(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      ${avatar(p, 44)}
      <div>
        <h2>${p.name}</h2>
        <div style="font-size:12px;color:var(--muted);margin-top:3px;">${pMatches} partite nello storico</div>
      </div>
    </div>
    <p style="color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:20px;">
      Rimuovendo il giocatore il suo profilo verrà eliminato, ma le partite dello storico resteranno registrate.
    </p>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-danger" style="flex:1;" onclick="removePlayer('${id}')">rimuovi</button>
      <button class="btn btn-secondary" style="flex:1;" onclick="closeModalForce()">annulla</button>
    </div>
  `);
};

window.removePlayer = function(id) {
  players = players.filter(p => p.id !== id);
  _selectedPlayers.delete(id);
  saveAll();
  closeModalForce();
  renderPlayers();
  toast('giocatore rimosso');
};

function renderPlayers() {
  const el = document.getElementById('players-list');
  let html = '';
  players.forEach(p => {
    const playerMatches = matches.filter(m => [...m.team1, ...m.team2].some(x => x.id === p.id));
    const wins = playerMatches.filter(m => {
      const inT1 = m.team1.some(x => x.id === p.id);
      return inT1 ? m.score1 > m.score2 : m.score2 > m.score1;
    }).length;

    html += `
    <div class="card" style="margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:12px;" onclick="showPlayerDetail('${p.id}')" style="cursor:pointer;">
        ${avatar(p, 44)}
        <div style="flex:1;cursor:pointer;" onclick="showPlayerDetail('${p.id}')">
          <div style="font-family:var(--font-head);font-weight:700;font-size:18px;letter-spacing:.01em;text-transform:uppercase;">${p.name}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">${playerMatches.length} partite · ${wins} vittorie</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="text-align:right;cursor:pointer;" onclick="showPlayerDetail('${p.id}')">
            <div style="font-family:var(--font-head);font-size:20px;font-weight:800;color:${p.color};">${p.rating}</div>
            <div style="font-size:10px;color:var(--muted);">skill</div>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();showRemovePlayer('${p.id}')" style="padding:6px 10px;color:var(--red);border-color:var(--red)30;">✕</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <div style="flex:1;text-align:center;background:var(--surface2);border-radius:var(--r-sm);padding:8px;">
          <div style="font-size:10px;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;">POR</div>
          <div style="font-family:var(--font-head);font-weight:700;font-size:18px;margin-top:2px;">${p.ratingP}</div>
        </div>
        <div style="flex:1;text-align:center;background:var(--surface2);border-radius:var(--r-sm);padding:8px;">
          <div style="font-size:10px;color:var(--orange);text-transform:uppercase;letter-spacing:.06em;">ATT</div>
          <div style="font-family:var(--font-head);font-weight:700;font-size:18px;margin-top:2px;">${p.ratingA}</div>
        </div>
        <div style="flex:1;text-align:center;background:var(--surface2);border-radius:var(--r-sm);padding:8px;">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;">WIN%</div>
          <div style="font-family:var(--font-head);font-weight:700;font-size:18px;margin-top:2px;">${playerMatches.length ? Math.round(wins / playerMatches.length * 100) : 0}%</div>
        </div>
      </div>
    </div>`;
  });

  if (!html) html = '<div class="empty"><div class="empty-icon">👥</div>Nessun giocatore. Aggiungine uno!</div>';
  el.innerHTML = html;
}

// ===================== INIT =====================
recalcAllRatings();
renderRank();
</script>
</body>
</html>
